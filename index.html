<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1620" id="meta-theme-color">
<title>SellerAssistantBot — Панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  /* === DARK THEME (default) === */
  --bg: #0F1620;
  --surface: #1A2332;
  --surface-2: #232E3C;
  --section-bg: #1C2733;
  --text: #FFFFFF;
  --text-2: #A8B7C7;
  --hint: #708499;
  --accent: #6AB3F3;
  --button: #5288C1;

  /* Chrome / structure */
  --app-bg-desktop: #07090E;
  --divider: rgba(255,255,255,0.04);
  --input-bg: rgba(0,0,0,0.2);
  --input-border: rgba(255,255,255,0.06);
  --progress-track: rgba(255,255,255,0.06);
  --action-overlay: rgba(255,255,255,0.18);
  --action-icon-bg: rgba(255,255,255,0.18);
  --overlay: rgba(0,0,0,0.5);
  --text-on-action: #FFFFFF;
  --chip-active-text: #001428;
  --button-text: #FFFFFF;
  --bubble-trigger-bg: rgba(245,166,35,0.08);
  --voice-btn-bg: rgba(82,136,193,0.12);
  --voice-btn-bg-active: rgba(82,136,193,0.22);
  --voice-btn-border: rgba(106,179,243,0.4);
  --voice-recorded-bg: rgba(46,201,115,0.10);

  /* Status pill backgrounds (translucent on dark) */
  --pill-running-bg: rgba(61,155,255,0.18);
  --pill-queued-bg: rgba(112,132,153,0.18);
  --pill-success-bg: rgba(46,201,115,0.18);
  --pill-failed-bg: rgba(236,57,66,0.18);
  --pill-warn-bg: rgba(245,166,35,0.18);
  --pill-running-text: var(--c-info);
  --pill-queued-text: var(--hint);
  --pill-success-text: var(--c-success);
  --pill-failed-text: var(--c-danger);
  --pill-warn-text: var(--c-warning);

  /* KPI delta colors */
  --kpi-up-bg: rgba(46,201,115,0.16);
  --kpi-up-text: #4DD893;
  --kpi-down-bg: rgba(236,57,66,0.16);
  --kpi-down-text: #FF6B73;
  --kpi-flat-bg: rgba(112,132,153,0.16);

  /* Chat-mode chips */
  --chat-mode-auto-bg: rgba(46,201,115,0.18);
  --chat-mode-auto-text: #4DD893;
  --chat-mode-silent-bg: rgba(112,132,153,0.20);
  --chat-mode-silent-text: var(--text-2);
  --chat-mode-paused-bg: rgba(245,166,35,0.18);
  --chat-mode-paused-text: var(--c-warning);

  /* Accent rgb (used for active chip backgrounds) */
  --accent-soft-bg: rgba(106,179,243,0.08);
  --button-shadow: 0 8px 24px rgba(82,136,193,0.4);
  --danger-shadow: 0 8px 24px rgba(236,57,66,0.35);
  --toast-success-text: #001A0E;

  --c-success: #2EC973;
  --c-warning: #F5A623;
  --c-danger: #EC3942;
  --c-info: #3D9BFF;

  --grad-orange: linear-gradient(135deg, #FF8A00 0%, #FF3D7F 100%);
  --grad-purple: linear-gradient(135deg, #7B5CFF 0%, #3D9BFF 100%);
  --grad-teal:   linear-gradient(135deg, #00C9A7 0%, #0FB1FF 100%);
  --grad-pink:   linear-gradient(135deg, #FF5E9C 0%, #7B5CFF 100%);
  --grad-blue:   linear-gradient(135deg, #3D9BFF 0%, #7B5CFF 100%);
  --grad-amber:  linear-gradient(135deg, #F5A623 0%, #FF6B6B 100%);

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 16px;
  --r-xl: 24px;

  --shadow-card: 0 1px 0 rgba(255,255,255,0.04), 0 8px 24px rgba(0,0,0,0.18);
  --shadow-pop: 0 12px 40px rgba(0,0,0,0.35);
  --shadow-desktop: 0 0 60px rgba(0,0,0,0.6);

  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* === LIGHT THEME ===
   Активируется через [data-theme="light"] (выставляется JS из tg.colorScheme
   или системной prefers-color-scheme). Вся палитра — функциональный аналог
   тёмной: те же градиенты в action-картах, цветные status-чипы насыщеннее
   за счёт меньшей прозрачности и более глубоких базовых цветов. */
[data-theme="light"] {
  --bg: #F5F7FA;
  --surface: #FFFFFF;
  --surface-2: #EEF1F5;
  --section-bg: #F0F3F7;
  --text: #0F1620;
  --text-2: #5A6878;
  --hint: #8895A5;
  --accent: #2F7FD6;
  --button: #2F7FD6;

  --app-bg-desktop: #E1E6EC;
  --divider: rgba(15,22,32,0.06);
  --input-bg: #F5F7FA;
  --input-border: #E1E5EA;
  --progress-track: rgba(15,22,32,0.06);
  --action-overlay: rgba(255,255,255,0.22);
  --action-icon-bg: rgba(255,255,255,0.25);
  --overlay: rgba(15,22,32,0.45);
  --text-on-action: #FFFFFF;
  --chip-active-text: #FFFFFF;
  --button-text: #FFFFFF;
  --bubble-trigger-bg: rgba(245,166,35,0.12);
  --voice-btn-bg: rgba(47,127,214,0.08);
  --voice-btn-bg-active: rgba(47,127,214,0.16);
  --voice-btn-border: rgba(47,127,214,0.35);
  --voice-recorded-bg: rgba(34,168,100,0.10);

  --pill-running-bg: rgba(61,155,255,0.14);
  --pill-queued-bg: rgba(90,104,120,0.12);
  --pill-success-bg: rgba(34,168,100,0.14);
  --pill-failed-bg: rgba(214,51,65,0.12);
  --pill-warn-bg: rgba(214,140,20,0.14);
  --pill-running-text: #1E78D6;
  --pill-queued-text: #5A6878;
  --pill-success-text: #1A8C50;
  --pill-failed-text: #C42030;
  --pill-warn-text: #C47A12;

  --kpi-up-bg: rgba(34,168,100,0.14);
  --kpi-up-text: #1A8C50;
  --kpi-down-bg: rgba(214,51,65,0.12);
  --kpi-down-text: #C42030;
  --kpi-flat-bg: rgba(136,149,165,0.14);

  --chat-mode-auto-bg: rgba(34,168,100,0.14);
  --chat-mode-auto-text: #1A8C50;
  --chat-mode-silent-bg: rgba(136,149,165,0.18);
  --chat-mode-silent-text: #5A6878;
  --chat-mode-paused-bg: rgba(214,140,20,0.14);
  --chat-mode-paused-text: #B5710F;

  --accent-soft-bg: rgba(47,127,214,0.10);
  --button-shadow: 0 6px 18px rgba(47,127,214,0.28);
  --danger-shadow: 0 6px 18px rgba(214,51,65,0.25);
  --toast-success-text: #FFFFFF;

  /* Mute pure-white sheen on light bg, чтобы action-карточки не пересвечивались */
  --c-info: #1E78D6;
  --c-success: #22A864;
  --c-warning: #D68C14;
  --c-danger: #D63341;

  /* Карточки на белом — тонкая тень с тёплым подтоном вместо чёрной */
  --shadow-card: 0 1px 2px rgba(15,22,32,0.04), 0 4px 14px rgba(15,22,32,0.06);
  --shadow-pop: 0 12px 36px rgba(15,22,32,0.14);
  --shadow-desktop: 0 0 40px rgba(15,22,32,0.10);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}
button { font: inherit; color: inherit; border: 0; background: transparent; cursor: pointer; }

/* Layout — mobile-first, centered 420px on desktop */
.app {
  max-width: 420px;
  min-height: 100dvh;
  margin: 0 auto;
  padding: 0 16px calc(96px + var(--safe-bottom));
  position: relative;
  background: var(--bg);
}
@media (min-width: 700px) {
  body { background: var(--app-bg-desktop); padding: 0; }
  .app {
    box-shadow: var(--shadow-desktop);
    min-height: 100dvh;
  }
}

/* Top back-bar (fake TG BackButton on non-main screens) */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 4px;
  min-height: 44px;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 16px; font-weight: 500; color: var(--accent);
  padding: 6px 8px 6px 0;
}
.back-btn:active { opacity: 0.6; }
.topbar-title {
  font-size: 17px; font-weight: 600; color: var(--text);
  position: absolute; left: 0; right: 0; text-align: center; pointer-events: none;
}
.menu-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface-2);
  display: grid; place-items: center;
  color: var(--text-2); font-size: 18px; line-height: 1;
}

/* Header (greeting + avatar) — main screen */
.header { padding: 18px 4px 8px; position: relative; }
.header-row {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.greeting { font-size: 14px; color: var(--hint); }
.username { margin: 2px 0 0; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--grad-purple);
  display: grid; place-items: center;
  font-weight: 700; font-size: 16px; color: var(--text-on-action);
  box-shadow: var(--shadow-card);
  flex-shrink: 0;
}
/* Header right cluster (theme toggle + avatar) */
.header-right {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface);
  display: grid; place-items: center;
  font-size: 18px; line-height: 1;
  border: 1px solid var(--input-border);
  cursor: pointer;
  user-select: none; -webkit-user-select: none;
  flex-shrink: 0;
  transition: transform 120ms ease, background 160ms ease;
}
.theme-toggle:active { transform: scale(0.92); }

/* Section title */
.section { margin-top: 22px; }
.section-title {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--hint);
  margin: 0 4px 10px;
}
.section-title .right { color: var(--accent); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 13px; }

/* KPI row 3-up */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}
.kpi-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 12px 12px 12px;
  min-height: 88px;
  display: flex; flex-direction: column; justify-content: space-between;
  box-shadow: var(--shadow-card);
}
.kpi-value {
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05;
  color: var(--text);
}
.kpi-label {
  font-size: 11px; color: var(--hint); margin-top: 4px; line-height: 1.25;
}
.kpi-delta {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 6px; border-radius: 6px;
  margin-top: 6px;
  align-self: flex-start;
}
.kpi-delta.up { background: var(--kpi-up-bg); color: var(--kpi-up-text); }
.kpi-delta.down { background: var(--kpi-down-bg); color: var(--kpi-down-text); }
.kpi-delta.flat { background: var(--kpi-flat-bg); color: var(--hint); }

/* Action grid 2-up gradient cards */
.actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.action-card {
  position: relative;
  display: flex; flex-direction: column;
  padding: 14px 14px 16px;
  border-radius: var(--r-lg);
  color: var(--text-on-action); text-align: left;
  min-height: 110px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: transform 120ms ease;
}
.action-card::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 100% 0%, var(--action-overlay), transparent 60%);
  pointer-events: none;
}
.action-card:active { transform: scale(0.98); }
.action-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--action-icon-bg);
  display: grid; place-items: center;
  font-size: 20px;
  margin-bottom: auto;
}
.action-title { font-size: 15px; font-weight: 700; margin-top: 12px; line-height: 1.2; }
.action-subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.action-arrow {
  position: absolute; top: 16px; right: 14px;
  opacity: 0.7;
}

/* Task / escalation list cards (in-progress) */
.task-card {
  display: block; width: 100%;
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 8px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-card);
  text-align: left;
  transition: transform 120ms ease;
}
.task-card:active { transform: scale(0.99); }
.task-card .rail {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
}
.task-card[data-priority="1"] .rail { background: var(--c-danger); }
.task-card[data-priority="2"] .rail { background: var(--c-warning); }
.task-card[data-priority="3"] .rail { background: var(--c-success); }
.task-card[data-status="closed"] .rail { background: var(--hint); }

.task-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.task-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.task-time {
  font-size: 12px; color: var(--hint); flex-shrink: 0;
}
.task-subtitle {
  font-size: 13px; color: var(--text-2);
  margin-top: 4px; line-height: 1.35;
}
.task-nudge {
  font-size: 12px; color: var(--hint);
  margin-top: 6px; font-style: italic;
}
.task-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.pill {
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 999px;
  letter-spacing: 0.02em;
}
.pill-running { background: var(--pill-running-bg); color: var(--pill-running-text); }
.pill-queued { background: var(--pill-queued-bg); color: var(--pill-queued-text); }
.pill-success { background: var(--pill-success-bg); color: var(--pill-success-text); }
.pill-failed { background: var(--pill-failed-bg); color: var(--pill-failed-text); }
.pill-warn { background: var(--pill-warn-bg); color: var(--pill-warn-text); }

.progress {
  margin-top: 10px;
  height: 4px;
  background: var(--progress-track);
  border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--c-info), #7B5CFF);
}

/* Chevron */
.chev {
  color: var(--hint); flex-shrink: 0;
}

/* Chat list cards */
.chat-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-card);
  transition: transform 120ms ease;
}
.chat-card:active { transform: scale(0.99); }
.chat-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 700; font-size: 15px; color: var(--text-on-action);
  flex-shrink: 0;
}
.chat-info { flex: 1; min-width: 0; }
.chat-title-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.chat-title { font-size: 14px; font-weight: 600; color: var(--text); }
.chat-subtitle { font-size: 13px; color: var(--text-2); margin-top: 2px; }
.chat-meta { font-size: 12px; color: var(--hint); margin-top: 4px; }
.chat-mode {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 999px;
}
.chat-mode.auto { background: var(--chat-mode-auto-bg); color: var(--chat-mode-auto-text); }
.chat-mode.silent { background: var(--chat-mode-silent-bg); color: var(--chat-mode-silent-text); }
.chat-mode.paused { background: var(--chat-mode-paused-bg); color: var(--chat-mode-paused-text); }

/* Filter chips */
.chips-row {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 0 12px;
  scrollbar-width: none;
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-2);
  font-size: 13px; font-weight: 500;
  white-space: nowrap;
}
.chip.active {
  background: var(--accent);
  color: var(--chip-active-text);
  font-weight: 600;
}

/* MainButton (sticky bottom) */
.main-button {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(12px + var(--safe-bottom));
  width: calc(100% - 32px);
  max-width: 388px;
  height: 50px;
  border-radius: 12px;
  background: var(--button);
  color: var(--button-text);
  font-size: 16px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: var(--button-shadow);
  transition: transform 120ms ease, opacity 120ms ease;
  z-index: 50;
}
.main-button:active { transform: translateX(-50%) scale(0.98); }
.main-button.secondary { background: var(--surface-2); color: var(--text); box-shadow: none; }
.main-button.danger { background: var(--c-danger); color: #FFFFFF; box-shadow: var(--danger-shadow); }
.main-button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Escalation-detail components */
.contragent-hero {
  display: flex; align-items: center; gap: 14px;
  padding: 14px;
  background: var(--surface);
  border-radius: var(--r-lg);
  margin-top: 8px;
  box-shadow: var(--shadow-card);
}
.contragent-hero .avatar { width: 56px; height: 56px; font-size: 20px; }
.contragent-hero .info { flex: 1; min-width: 0; }
.contragent-hero .name { font-size: 16px; font-weight: 700; }
.contragent-hero .meta { font-size: 13px; color: var(--text-2); margin-top: 2px; }
.contragent-hero .age { font-size: 12px; color: var(--hint); margin-top: 2px; }

.summary-card {
  margin-top: 12px;
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 14px 14px 14px 18px;
  position: relative;
  box-shadow: var(--shadow-card);
}
.summary-card .rail {
  position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px;
  border-radius: 0 2px 2px 0;
}
.summary-card[data-priority="1"] .rail { background: var(--c-danger); }
.summary-card[data-priority="2"] .rail { background: var(--c-warning); }
.summary-card .label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--c-danger);
  margin-bottom: 6px;
}
.summary-card[data-priority="2"] .label { color: var(--c-warning); }
.summary-card .body { font-size: 14px; color: var(--text); line-height: 1.45; }

/* Chat context bubbles */
.bubble {
  background: var(--surface);
  border-radius: var(--r-md);
  padding: 10px 12px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-card);
}
.bubble.trigger {
  background: var(--bubble-trigger-bg);
  border-left: 3px solid var(--c-warning);
}
.bubble .who {
  font-size: 12px; font-weight: 600; color: var(--accent);
}
.bubble .who .ts { color: var(--hint); font-weight: 400; margin-left: 6px; }
.bubble .text {
  font-size: 14px; color: var(--text); margin-top: 4px; line-height: 1.4;
}

/* Composer */
.composer {
  margin-top: 16px;
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 12px;
  box-shadow: var(--shadow-card);
}
.composer .voice-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%;
  padding: 16px;
  background: var(--voice-btn-bg);
  border: 1px dashed var(--voice-btn-border);
  border-radius: var(--r-md);
  color: var(--accent);
  font-size: 14px; font-weight: 500;
}
.composer .voice-btn:active { background: var(--voice-btn-bg-active); }
.composer .switch-row {
  display: flex; gap: 6px;
  margin-top: 10px;
  font-size: 12px; color: var(--hint);
  justify-content: center;
}
.composer .switch-row a {
  color: var(--accent); text-decoration: none; cursor: pointer;
}
.composer textarea {
  width: 100%;
  min-height: 80px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--r-md);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  resize: vertical;
  outline: none;
}
.composer textarea:focus { border-color: var(--accent); }

.voice-recorded {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  background: var(--voice-recorded-bg);
  border-radius: var(--r-md);
}
.voice-recorded .icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--c-success);
  display: grid; place-items: center;
  font-size: 16px; color: var(--text-on-action);
}
.voice-recorded .info { flex: 1; }
.voice-recorded .stt {
  font-size: 13px; color: var(--text); font-style: italic;
}
.voice-recorded .duration {
  font-size: 11px; color: var(--hint); margin-top: 2px;
}
.voice-actions { display: flex; gap: 6px; }
.voice-actions button {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface-2);
  display: grid; place-items: center;
  font-size: 12px; color: var(--text-2);
}

/* Contragent-detail metrics */
.metrics-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  margin-top: 8px;
}
@media (min-width: 380px) {
  .metrics-grid { grid-template-columns: repeat(3, 1fr); }
}
.metric-card {
  background: var(--surface);
  border-radius: var(--r-md);
  padding: 12px;
  box-shadow: var(--shadow-card);
}
.metric-value { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.metric-label { font-size: 11px; color: var(--hint); margin-top: 2px; line-height: 1.25; }

/* Open questions list */
.checklist {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 8px;
  box-shadow: var(--shadow-card);
}
.checklist .item {
  display: flex; gap: 10px; padding: 10px;
  font-size: 14px; color: var(--text-2); line-height: 1.4;
}
.checklist .item .box {
  width: 18px; height: 18px;
  border: 1.5px solid var(--hint);
  border-radius: 4px; flex-shrink: 0;
  margin-top: 1px;
}
.checklist .item + .item { border-top: 1px solid var(--divider); }

/* Style / agreement timelines */
.bullets {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
}
.bullets .bullet {
  display: flex; gap: 10px;
  font-size: 14px; color: var(--text-2);
  padding: 6px 0;
  line-height: 1.4;
}
.bullets .bullet::before { content: '•'; color: var(--accent); flex-shrink: 0; }

.timeline {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 8px;
  box-shadow: var(--shadow-card);
}
.timeline .row {
  display: flex; gap: 12px; padding: 10px;
  font-size: 14px; line-height: 1.4;
}
.timeline .row + .row { border-top: 1px solid var(--divider); }
.timeline .date {
  flex-shrink: 0; width: 64px;
  font-size: 12px; color: var(--hint);
  font-variant-numeric: tabular-nums;
  padding-top: 1px;
}
.timeline .text { color: var(--text-2); }

.contacts {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 8px;
  box-shadow: var(--shadow-card);

.contact-row {

.contact-row + .contact-row { border-top: 1px solid var(--divider); }

  font-size: 14px;

.contact-row .text { flex: 1; }
.contact-row .arrow { color: var(--hint); }

  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms ease;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed;
  left: 50%; bottom: 0; transform: translate(-50%, 100%);
  width: 100%; max-width: 420px;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 12px 16px calc(20px + var(--safe-bottom));
  box-shadow: var(--shadow-pop);
  z-index: 101;
  transition: transform 220ms cubic-bezier(.2,.8,.2,1);

.sheet.open { transform: translate(-50%, 0); }

  margin: 4px auto 12px;

.sheet h3 { margin: 4px 0 16px; font-size: 17px; font-weight: 600; }

/* ============================================================
   STATE & ROUTER
============================================================ */
const state = {
  currentScreen: 'main',
  history: [],   // for back navigation
  params: {},    // current screen params
  modeFilter: 'all',
  composerMode: 'voice', // voice | text | recorded
  composerText: '',
  themeMode: (function () {
    try {
      const saved = localStorage.getItem('themeMode');
      if (saved === 'auto' || saved === 'light' || saved === 'dark') return saved;
    } catch (e) { /* ignore (private mode etc.) */ }
    return 'auto';
  })()
};

function navigate(screen, params = {}, replace = false) {
  if (!replace && state.currentScreen) {
    state.history.push({ screen: state.currentScreen, params: { ...state.params } });
  }
  state.currentScreen = screen;
  state.params = params;
  state.composerMode = 'voice';
  state.composerText = '';
  render();
  window.scrollTo(0, 0);

  // Telegram BackButton sync
  if (window.Telegram?.WebApp?.BackButton) {
    if (screen === 'main') window.Telegram.WebApp.BackButton.hide();
    else window.Telegram.WebApp.BackButton.show();
  }
  // MainButton sync — hide; per screen render decides if shown
  if (window.Telegram?.WebApp?.MainButton) {
    window.Telegram.WebApp.MainButton.hide();
  }
}

function back() {
  if (state.history.length === 0) {
    navigate('main', {}, true);
    return;
  }
  const prev = state.history.pop();
  state.currentScreen = prev.screen;
  state.params = prev.params;
  state.composerMode = 'voice';
  state.composerText = '';
  render();
  window.scrollTo(0, 0);
  if (window.Telegram?.WebApp?.BackButton) {
    if (state.currentScreen === 'main') window.Telegram.WebApp.BackButton.hide();
  }
}

const $ = (id) => document.getElementById(id);
const h = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'style') el.style.cssText = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
};

function greeting() {
  const hr = new Date().getHours();
  if (hr < 6) return 'Доброй ночи';
  if (hr < 12) return 'Доброе утро';
  if (hr < 18) return 'Добрый день';
  return 'Добрый вечер';
}

function composerInner() {
  if (state.composerMode === 'recorded') {
    return h('div', {}, [
      h('div', { class: 'voice-recorded' }, [
        h('div', { class: 'icon' }, ['🎤']),
        h('div', { class: 'info' }, [

          h('button', { onClick: () => { state.composerMode = 'voice'; refreshComposer(); } }, ['×'])
        ])
      ]),
      h('div', { class: 'switch-row' }, [
        h('a', { onClick: () => { state.composerMode = 'voice'; refreshComposer(); } }, ['Перезаписать'])
      ])
    ]);
  }
  if (state.composerMode === 'text') {
    return h('div', {}, [
      h('textarea', {
        placeholder: 'Напиши что ответить... Можно коротко, бот доформулирует.',
        oninput: (e) => { state.composerText = e.target.value; updateMainButton(); }
      }, []),
      h('div', { class: 'switch-row' }, [
        h('a', { onClick: () => { state.composerMode = 'voice'; state.composerText = ''; refreshComposer(); } }, ['🎤 переключить на голос'])
      ])
    ]);
  }
  // default voice
  return h('div', {}, [
    h('button', {
      class: 'voice-btn',
      onClick: () => {
        // Simulate recording → recorded
        toast('Запись... отпусти');
        setTimeout(() => { state.composerMode = 'recorded'; refreshComposer(); }, 800);
      }
    }, ['🎤  Нажми и удерживай']),
    h('div', { class: 'switch-row' }, [
      h('a', { onClick: () => { state.composerMode = 'text'; refreshComposer(); } }, ['✏ написать текстом'])
    ])
  ]);
}

function refreshComposer() {
  const box = $('composer-box');
  if (!box) return;
  box.innerHTML = '';
  box.appendChild(composerInner());
  updateMainButton();
}

function updateMainButton() {
  // Re-render only the main button. Simplest approach — re-render screen.
  // But to avoid losing focus on textarea, do a light update.
  const buttons = document.querySelectorAll('.main-button');
  if (!buttons.length) return;
  const sendBtn = buttons[buttons.length - 1];
  const isReady = state.composerMode === 'recorded' || (state.composerMode === 'text' && state.composerText.trim().length > 0);
  if (isReady) sendBtn.removeAttribute('disabled');
  else sendBtn.setAttribute('disabled', 'true');
}

function renderChatsList() {
  const app = $('app');
  app.innerHTML = '';
  app.appendChild(topbar('Чаты (' + MOCK_DATA.chats.length + ')'));

  // Filter chips
  const totals = { all: MOCK_DATA.chats.length };
  for (const m of ['auto', 'silent', 'paused']) totals[m] = MOCK_DATA.chats.filter(c => c.mode === m).length;
  const chips = ['all', 'auto', 'silent', 'paused'].map(f => h('button', {
    class: 'chip' + (state.modeFilter === f ? ' active' : ''),
    onClick: () => { state.modeFilter = f; renderChatsList(); }
  }, [labelForFilter(f) + ' (' + totals[f] + ')']));
  app.appendChild(h('div', { class: 'chips-row' }, chips));

  // List
  const filtered = state.modeFilter === 'all' ? MOCK_DATA.chats : MOCK_DATA.chats.filter(c => c.mode === state.modeFilter);
  if (filtered.length === 0) {
    app.appendChild(h('div', { class: 'empty' }, [
      h('div', { class: 'icon' }, [iconForMode(state.modeFilter)]),
      h('div', { class: 'title' }, ['Чатов в этом режиме нет']),
      h('div', { class: 'sub' }, ['Все чаты сейчас в другом режиме.'])
    ]));
    return;
  }

  for (const c of filtered) {
    app.appendChild(chatCard(c));
  }
}

function labelForFilter(f) {
  return { all: 'Все', auto: 'Auto', silent: 'Silent', paused: 'Paused' }[f];
}
function iconForMode(m) {
  return { auto: '🟢', silent: '🔇', paused: '⏸', all: '💬' }[m];
}

function chatCard(c) {
  const escMeta = c.open_escalations > 0
    ? c.open_escalations + ' эскал. ' + (c.max_priority === 1 ? '⚠' : c.max_priority === 2 ? '🟡' : '🟢')
    : null;
  return h('div', {
    class: 'chat-card',
    onClick: () => {
      if (c.slug) navigate('contragent-detail', { slug: c.slug });
      else if (c.new_card) toast('Создать карточку контрагента (mock)');
      else toast('Group chat — выбор контрагента (mock)');
    }
  }, [
    h('div', { class: 'chat-avatar', style: 'background:' + GRAD_MAP[c.avatar_grad] }, [c.avatar]),
    h('div', { class: 'chat-info' }, [
      h('div', { class: 'chat-title-row' }, [
        h('div', { class: 'chat-title' }, [c.chat_title]),
        h('div', { style: 'display:flex; gap:6px; align-items:center;' }, [

            class: 'chat-mode ' + c.mode,

          }, [iconForMode(c.mode) + ' ' + c.mode]),

function openModeSheet(chat) {
  const sheet = $('sheet');
  const backdrop = $('sheet-backdrop');
  sheet.innerHTML = '';
  sheet.appendChild(h('div', { class: 'grabber' }, []));
  sheet.appendChild(h('h3', {}, [chat.chat_title]));
  sheet.appendChild(h('div', { class: 'muted', style: 'font-size:13px; margin-bottom:14px;' }, [chat.contragent_names]));

  const opts = [
    { id: 'auto', name: '🟢 Auto', desc: 'Бот отвечает контрагенту автономно, эскалирует тебе важное.' },
    { id: 'silent', name: '🔇 Silent', desc: 'Бот читает чат и пишет тебе в DM по важному, но в чат ничего не отправляет.' },
    { id: 'paused', name: '⏸ Paused', desc: 'Бот не читает чат и не пишет. Включи когда захочешь обратно.' }
  ];
  let selected = chat.mode;
  for (const o of opts) {
    const node = h('div', {
      class: 'mode-option' + (o.id === selected ? ' active' : ''),
      onClick: () => {
        selected = o.id;
        sheet.querySelectorAll('.mode-option').forEach(el => el.classList.remove('active'));
        node.classList.add('active');
      }
    }, [
      h('div', { class: 'body' }, [
        h('div', { class: 'name' }, [o.name]),
        h('div', { class: 'desc' }, [o.desc])
      ]),
      h('div', { class: 'check' }, ['✓'])
    ]);
    sheet.appendChild(node);
  }

  sheet.appendChild(h('button', {
    class: 'main-button',
    style: 'position: static; width: 100%; max-width: none; transform: none; margin-top: 14px; box-shadow: none;',
    onClick: () => {
      chat.mode = selected;
      closeSheet();
      toast('Режим изменён: ' + selected, 'success');
      renderChatsList();
    }
  }, ['Применить']));

  backdrop.classList.add('open');
  sheet.classList.add('open');
  backdrop.onclick = closeSheet;
}

function closeSheet() {
  $('sheet').classList.remove('open');
  $('sheet-backdrop').classList.remove('open');
}

function topbar(title, opts = {}) {
  return h('div', { class: 'topbar', style: 'position: relative;' }, [
    h('button', { class: 'back-btn', onClick: () => back() }, [
      h('span', { html: backSVG() }, []),
      h('span', {}, ['Назад'])
    ]),
    h('div', { class: 'topbar-title' }, [title]),
    opts.menu
      ? h('button', { class: 'menu-btn', onClick: () => toast('Меню (mock): открыть в TG, скопировать ID, снять без ответа') }, ['⋯'])
      : h('div', { style: 'width: 32px;' }, [])
  ]);
}

function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => {
    t.classList.remove('show');
  }, 1800);
}

function showConfirm(msg, onYes) {
  if (window.Telegram?.WebApp?.showConfirm) {
    window.Telegram.WebApp.showConfirm(msg, (ok) => { if (ok) onYes(); });
  } else {
    if (confirm(msg)) onYes();
  }
}

============================================================ */
function render() {
  const screen = state.currentScreen;
  if (screen === 'main') return renderMain();
  if (screen === 'escalations-list') return renderMain(); // alias for now
  if (screen === 'escalation-detail') return renderEscalationDetail();
  if (screen === 'chats-list') return renderChatsList();
  if (screen === 'contragent-detail') return renderContragentDetail();
  // default
  renderMain();
}

/* ============================================================
   INIT — theme (auto / light / dark)
   Источник истины:
     state.themeMode — пользовательский выбор (localStorage 'themeMode').
       'auto'  → следуем за TG.colorScheme либо prefers-color-scheme
       'light' → форсируем светлую
       'dark'  → форсируем тёмную
   В Telegram при auto-режиме накладываем tg.themeParams.* поверх — пусть
   нативная палитра пользователя выигрывает у наших дефолтов.
   Подписаны на 'themeChanged' (TG) и 'change' (matchMedia), но реагируем
   только когда themeMode === 'auto'.
============================================================ */
const THEME_META_COLORS = { dark: '#0F1620', light: '#F5F7FA' };
const THEME_LABELS = { auto: 'авто', light: 'светлая', dark: 'тёмная' };
const THEME_ICONS  = { auto: '🌓', light: '☀', dark: '🌙' };

function themeIcon(mode) {
  return THEME_ICONS[mode] || THEME_ICONS.auto;
}

function systemScheme() {
  const tg = window.Telegram?.WebApp;
  if (tg && tg.colorScheme) return tg.colorScheme === 'light' ? 'light' : 'dark';
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
  return 'dark';
}

function applyTheme(scheme) {
  const t = scheme === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const meta = document.getElementById('meta-theme-color');
  if (meta) meta.setAttribute('content', THEME_META_COLORS[t]);
}

/* Применить текущий themeMode (с учётом системы для 'auto'). */
function applyThemeMode() {
  const mode = state.themeMode;
  const effective = (mode === 'auto') ? systemScheme() : mode;
  applyTheme(effective);
  // В auto-режиме разрешаем TG-палитре «протекать»; в forced-режимах
  // чистим инлайн-переопределения, чтобы наш data-theme был чистым.
  const root = document.documentElement;
  if (mode === 'auto') {
    const tg = window.Telegram?.WebApp;
    if (tg && tg.themeParams) applyTelegramThemeParams(tg.themeParams);
  } else {
    [
      '--bg','--surface','--section-bg','--text','--text-2','--hint',
      '--accent','--button','--button-text','--c-danger'
    ].forEach((p) => root.style.removeProperty(p));
    const meta = document.getElementById('meta-theme-color');
    if (meta) meta.setAttribute('content', THEME_META_COLORS[effective]);
  }
  // Sync icon на тумблере, если он уже отрисован.
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = themeIcon(mode);
}

/* Cycle: auto → light → dark → auto (вызывается onClick тумблера). */
function cycleThemeMode() {
  const order = ['auto', 'light', 'dark'];
  const next = order[(order.indexOf(state.themeMode) + 1) % order.length];
  state.themeMode = next;
  try { localStorage.setItem('themeMode', next); } catch (e) { /* ignore */ }
  applyThemeMode();
  // Haptic — мягкий тап в Telegram WebApp.
  try {
    const hf = window.Telegram?.WebApp?.HapticFeedback;
    if (hf && hf.impactOccurred) hf.impactOccurred('light');
  } catch (e) { /* noop */ }
  toast('Тема: ' + THEME_LABELS[next]);
}

function applyTelegramThemeParams(tp) {
  if (!tp) return;
  const root = document.documentElement;
  // Точечно мапим TG palette на наши переменные. Это перезаписывает
  // дефолты темы (light/dark уже выставлен на data-theme), позволяя
  // нативной TG-теме «протекать» в Mini App.
  if (tp.bg_color)            root.style.setProperty('--bg', tp.bg_color);
  if (tp.secondary_bg_color)  root.style.setProperty('--surface', tp.secondary_bg_color);
  if (tp.section_bg_color)    root.style.setProperty('--section-bg', tp.section_bg_color);
  if (tp.text_color)          root.style.setProperty('--text', tp.text_color);
  if (tp.subtitle_text_color) root.style.setProperty('--text-2', tp.subtitle_text_color);
  if (tp.hint_color)          root.style.setProperty('--hint', tp.hint_color);
  if (tp.link_color)          root.style.setProperty('--accent', tp.link_color);
  if (tp.button_color)        root.style.setProperty('--button', tp.button_color);
  if (tp.button_text_color)   root.style.setProperty('--button-text', tp.button_text_color);
  if (tp.destructive_text_color) root.style.setProperty('--c-danger', tp.destructive_text_color);
  if (tp.bg_color) {
    const meta = document.getElementById('meta-theme-color');
    if (meta) meta.setAttribute('content', tp.bg_color);
  }
}

function initTheme() {
  const tg = window.Telegram?.WebApp;
  const mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: light)') : null;

  // Telegram WebApp init (важно сделать до первого applyThemeMode,
  // чтобы tg.colorScheme и themeParams уже были доступны).
  if (tg) {
    try {
      tg.ready();
      tg.expand();
      tg.onEvent('themeChanged', () => {
        // В auto — следуем за TG; в forced-режимах игнорим.
        if (state.themeMode === 'auto') applyThemeMode();
      });
      tg.onEvent('backButtonClicked', () => back());
      if (tg.BackButton) tg.BackButton.hide();
    } catch (e) {
      console.warn('TG WebApp init failed (probably running in browser)', e);
    }
  }

  // Browser fallback: системное переключение light/dark — реагируем
  // тоже только в auto-режиме.
  if (mql) {
    const onChange = () => { if (state.themeMode === 'auto') applyThemeMode(); };
    if (mql.addEventListener) mql.addEventListener('change', onChange);
    else if (mql.addListener) mql.addListener(onChange); // Safari < 14
  }

  // Первичное применение по сохранённому режиму.
  applyThemeMode();
}

initTheme();
render();
</script>
</body>
</html>
